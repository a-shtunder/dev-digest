# Harness evals — runs the DevDigest Claude Code evals on OpenRouter, per-PR, selectively.
#
# On a pull request we diff against the base branch and run ONLY the suites the change touches:
#   • a changed skill      → that skill's evals        (content tier, native OpenRouter, no proxy)
#   • a changed agent      → that agent's evals + the workflow tier
#   • a changed CLAUDE.md  → the workflow tier
#   • an engine change     → the workflow tier
# A changed artifact with no written evals is reported as SKIP, not a failure.
#
# Models are a job-level knob (not surfaced in any UI). Skills (content tier) run on a cheap
# non-Anthropic model (DeepSeek). The tool tiers (agents/workflow) run on Claude Haiku 4.5:
# calibration showed the cheap OSS models are too noisy on borderline scoping cases, while Haiku
# passes the suites 4/4 and — as an Anthropic slug via OpenRouter's skin — gives reliable subagent
# dispatch, Skill activation, and valid judge JSON. Still cheap (~$1/full tool-tier run) and the
# suites run only when artifacts change. Override per manual run via the workflow_dispatch inputs.

name: evals

on:
  pull_request:
    paths:
      - '.claude/**'
      - 'CLAUDE.md'
      - 'evals/**'
      - '.github/workflows/evals.yml'
  workflow_dispatch:
    inputs:
      skills_model:
        description: 'OpenRouter slug for the skills (content) tier'
        default: 'deepseek/deepseek-chat'
      tool_model:
        description: 'OpenRouter slug for the agents + workflow (tool) tiers'
        default: 'anthropic/claude-haiku-4.5'

permissions:
  contents: read

concurrency:
  group: evals-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Detect which suites this PR should run ──────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      skills: ${{ steps.detect.outputs.skills }}
      agents: ${{ steps.detect.outputs.agents }}
      run_workflow: ${{ steps.detect.outputs.run_workflow }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: detect
        working-directory: evals
        env:
          # workflow_dispatch has no diff — fall back to "everything changed" by diffing the root commit.
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          if [ -n "$BASE_SHA" ]; then
            RANGE="$BASE_SHA...HEAD"
          else
            RANGE="$(git rev-list --max-parents=0 HEAD | tail -1)...HEAD"
          fi
          CHANGED_FILES="$(git diff --name-only "$RANGE")"
          export CHANGED_FILES
          node scripts/ci-detect.mjs

  # ── 2. Skills — content tier, native OpenRouter, no proxy ──────────────────
  skills:
    needs: changes
    if: needs.changes.outputs.skills != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        skill: ${{ fromJSON(needs.changes.outputs.skills) }}
    defaults:
      run:
        working-directory: evals
    env:
      EVAL_BACKEND: openrouter
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      EVAL_MODEL: ${{ inputs.skills_model || 'deepseek/deepseek-chat' }}
      EVAL_JUDGE_MODEL: ${{ inputs.skills_model || 'deepseek/deepseek-chat' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: evals/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec vitest run "skills/${{ matrix.skill }}/"

  # ── 3. Agents — tool tier, needs the LiteLLM translating proxy ─────────────
  agents:
    needs: changes
    if: needs.changes.outputs.agents != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Each matrix entry is its own runner with its own proxy container, and Haiku via OpenRouter's
      # Anthropic skin handles concurrency fine — so agents fan out in parallel, no serial wait.
      matrix:
        agent: ${{ fromJSON(needs.changes.outputs.agents) }}
    defaults:
      run:
        working-directory: evals
    env:
      EVAL_BACKEND: openrouter
      OPENROUTER_BASE_URL: http://localhost:4000
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      EVAL_MODEL: ${{ inputs.tool_model || 'anthropic/claude-haiku-4.5' }}
      EVAL_JUDGE_MODEL: ${{ inputs.tool_model || 'anthropic/claude-haiku-4.5' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: evals/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: docker compose -f proxy/docker-compose.yml up -d
      - run: pnpm proxy:wait
      - run: pnpm exec vitest run "agents/${{ matrix.agent }}/" --no-file-parallelism
      - if: failure()
        run: docker compose -f proxy/docker-compose.yml logs --tail 100
      - if: always()
        run: docker compose -f proxy/docker-compose.yml down

  # ── 4. Workflow — live-harness tier. Non-blocking: activation cases are ────
  #     behaviour-shaped and only "indicative" on non-Anthropic models (README).
  workflow:
    needs: changes
    if: needs.changes.outputs.run_workflow == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: evals
    env:
      EVAL_BACKEND: openrouter
      OPENROUTER_BASE_URL: http://localhost:4000
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      EVAL_MODEL: ${{ inputs.tool_model || 'anthropic/claude-haiku-4.5' }}
      EVAL_JUDGE_MODEL: ${{ inputs.tool_model || 'anthropic/claude-haiku-4.5' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: evals/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: docker compose -f proxy/docker-compose.yml up -d
      - run: pnpm proxy:wait
      - run: pnpm exec vitest run workflow --no-file-parallelism
      - if: failure()
        run: docker compose -f proxy/docker-compose.yml logs --tail 100
      - if: always()
        run: docker compose -f proxy/docker-compose.yml down
